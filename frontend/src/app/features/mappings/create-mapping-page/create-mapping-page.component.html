<main class="create-page">
  <section class="wizard-shell" aria-labelledby="create-mapping-title">
    <header class="wizard-header">
      <h1 id="create-mapping-title">Yeni Mapping Oluştur</h1>
      <app-wizard-stepper [currentStep]="1"></app-wizard-stepper>
    </header>

    <form class="mapping-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-grid">
        <div class="field">
          <label for="mapping-name">Mapping Adı</label>
          <input
            id="mapping-name"
            type="text"
            formControlName="name"
            autocomplete="off"
            [class.field__control--invalid]="nameInvalid"
          >
          <p class="validation-message" *ngIf="nameInvalid">Mapping adı zorunludur.</p>
        </div>

        <div class="field">
          <label for="mapping-description">Açıklama</label>
          <textarea
            id="mapping-description"
            formControlName="description"
            rows="4"
          ></textarea>
            <p class="validation-message" *ngIf="descriptionInvalid">Açıklama zorunludur.</p>
        </div>
      </div>

      <fieldset class="option-section" aria-label="Kaynak dosya yükleme">
        <label
          class="source-upload"
          [class.source-upload--ready]="hasSourceFile"
          [class.source-upload--active]="isSourceDragActive"
          [class.source-upload--disabled]="isSubmitting"
          (dragover)="onSourceFileDragOver($event)"
          (dragleave)="onSourceFileDragLeave($event)"
          (drop)="onSourceFileDropped($event)"
        >
          <input
            type="file"
            accept=".xlsx,.xls,.csv,.txt"
            (change)="onSourceFileSelected($event)"
            [disabled]="isSubmitting"
          >
          <span class="source-upload__icon" aria-hidden="true"></span>
          <span class="source-upload__title">Dosyanızı buraya sürükleyin veya</span>
          <span class="source-upload__button">Dosya Seç</span>
          <span class="source-upload__description">Desteklenen dosya türleri: Excel (.xlsx, .xls), CSV (.csv), TXT (.txt)</span>
          <span class="source-upload__meta" *ngIf="hasSourceFile">
            {{ sourceFileName }} · {{ sourceFields.length }} alan · {{ detectedSourceTypeLabel }}
          </span>
        </label>
        <p class="validation-message" *ngIf="sourceFileError">{{ sourceFileError }}</p>
      </fieldset>

      <div class="feedback" aria-live="polite">
        <p class="alert alert--success" *ngIf="successMessage">{{ successMessage }}</p>
        <p class="alert alert--error" *ngIf="errorMessage">{{ errorMessage }}</p>
      </div>

      <div class="form-actions">
        <button class="primary-action" type="submit" [disabled]="form.invalid || isSubmitting">
          <span *ngIf="!isSubmitting">Devam Et</span>
          <span *ngIf="isSubmitting">Kaydediliyor...</span>
        </button>
      </div>
    </form>
  </section>
</main>
