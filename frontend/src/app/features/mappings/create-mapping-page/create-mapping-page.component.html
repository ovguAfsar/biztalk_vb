<main class="create-page">
  <div class="create-layout" [class.create-layout--panel-open]="isMappingsPanelOpen">
    <aside class="mappings-panel" [class.mappings-panel--open]="isMappingsPanelOpen" aria-labelledby="mappings-list-title">
      <button
        class="mappings-panel__toggle"
        type="button"
        [attr.aria-expanded]="isMappingsPanelOpen"
        (click)="toggleMappingsPanel()"
      >
        <span>Mappings</span>
        <span class="mappings-panel__count">{{ mappings.length }}</span>
      </button>

      <div class="mappings-panel__content" *ngIf="isMappingsPanelOpen">
        <button
          class="mappings-panel__new"
          type="button"
          [class.mappings-panel__new--active]="!isEditingMapping"
          (click)="startNewMapping()"
        >
          Yeni Mapping
        </button>

        <div class="mappings-panel__header">
          <h2 id="mappings-list-title">Geçmiş</h2>
        </div>

        <label class="mapping-search" for="mapping-search">
          <span>Geçmişte ara</span>
          <input
            id="mapping-search"
            type="search"
            placeholder="Mapping adı, durum..."
            [value]="mappingSearchTerm"
            (input)="updateMappingSearchTerm($event)"
          >
        </label>

        <p class="mappings-panel__state" *ngIf="isMappingsLoading">Yükleniyor...</p>
        <p class="validation-message" *ngIf="mappingsError">{{ mappingsError }}</p>
        <p class="mappings-panel__state" *ngIf="!isMappingsLoading && !mappingsError && mappings.length === 0">
          Henüz mapping yok.
        </p>
        <p class="mappings-panel__state" *ngIf="!isMappingsLoading && !mappingsError && mappings.length > 0 && filteredMappings.length === 0">
          Aramaya uygun mapping bulunamadı.
        </p>

        <div class="mapping-list" *ngIf="filteredMappings.length > 0">
          <button
            class="mapping-list__item"
            type="button"
            *ngFor="let mapping of filteredMappings"
            [class.mapping-list__item--active]="selectedMapping?.id === mapping.id"
            (click)="selectMapping(mapping)"
          >
            <span class="mapping-list__name">{{ mapping.name }}</span>
            <span class="mapping-list__meta">Durum: {{ getStatusLabel(mapping.status) }}</span>
            <span class="mapping-list__meta">Oluşturma: {{ mapping.createdAt | date:'dd.MM.yyyy HH:mm' }}</span>
            <span class="mapping-list__meta">Güncelleme: {{ mapping.updatedAt | date:'dd.MM.yyyy HH:mm' }}</span>
          </button>
        </div>
      </div>
    </aside>

  <section class="wizard-shell" aria-labelledby="create-mapping-title">
    <header class="wizard-header">
      <h1 id="create-mapping-title">{{ isEditingMapping ? 'Mapping Düzenle' : 'Yeni Mapping Oluştur' }}</h1>
      <app-wizard-stepper [currentStep]="1"></app-wizard-stepper>
    </header>

    <form class="mapping-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-grid">
        <div class="field">
          <label for="mapping-name">Mapping Adı</label>
          <input
            id="mapping-name"
            type="text"
            formControlName="name"
            autocomplete="off"
            [class.field__control--invalid]="nameInvalid"
          >
          <p class="validation-message" *ngIf="nameInvalid">Mapping adı zorunludur.</p>
        </div>

        <div class="field">
          <label for="mapping-description">Açıklama</label>
          <textarea
            id="mapping-description"
            formControlName="description"
            rows="4"
          ></textarea>
            <p class="validation-message" *ngIf="descriptionInvalid">Açıklama zorunludur.</p>
        </div>
      </div>

      <fieldset class="option-section" aria-label="Kaynak dosya yükleme">
        <label
          class="source-upload"
          [class.source-upload--ready]="hasSourceFile"
          [class.source-upload--active]="isSourceDragActive"
          [class.source-upload--disabled]="isSubmitting"
          (dragover)="onSourceFileDragOver($event)"
          (dragleave)="onSourceFileDragLeave($event)"
          (drop)="onSourceFileDropped($event)"
        >
          <input
            type="file"
            accept=".xlsx,.xls,.csv,.txt"
            (change)="onSourceFileSelected($event)"
            [disabled]="isSubmitting"
          >
          <span class="source-upload__icon" aria-hidden="true"></span>
          <span class="source-upload__title">Dosyanızı buraya sürükleyin veya</span>
          <span class="source-upload__button">Dosya Seç</span>
          <span class="source-upload__description">Desteklenen dosya türleri: Excel (.xlsx, .xls), CSV (.csv), TXT (.txt)</span>
          <span class="source-upload__meta" *ngIf="hasSourceFile">
            {{ sourceFileMeta }}
          </span>
        </label>
        <p class="validation-message" *ngIf="sourceFileError">{{ sourceFileError }}</p>
      </fieldset>

      <div class="feedback" aria-live="polite">
        <p class="alert alert--success" *ngIf="successMessage">{{ successMessage }}</p>
        <p class="alert alert--error" *ngIf="errorMessage">{{ errorMessage }}</p>
      </div>

      <div class="form-actions">
        <button class="primary-action" type="submit" [disabled]="!canContinue">
          <span *ngIf="!isSubmitting">{{ isEditingMapping ? 'Güncelle ve Devam Et' : 'Devam Et' }}</span>
          <span *ngIf="isSubmitting">Kaydediliyor...</span>
        </button>
      </div>
    </form>
  </section>
  </div>
</main>
